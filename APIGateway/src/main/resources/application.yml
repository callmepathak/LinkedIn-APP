server:
  port: 8080

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      routes:

        # ==========================
        # User Service
        # ==========================
        - id: user-service
          uri: lb://USER-SERVICE
          predicates:
            - Path=/api/v1/users/**
          filters:
            - StripPrefix=2

        # Swagger
        - id: user-swagger
          uri: lb://USER-SERVICE
          predicates:
            - Path=/users/v3/api-docs

        # ==========================
        # Posts Service
        # ==========================
        - id: posts-service
          uri: lb://POSTS-SERVICE
          predicates:
            - Path=/api/v1/posts/**
          filters:
            - StripPrefix=2
            - name: AuthenticationFilter

        # Swagger
        - id: posts-swagger
          uri: lb://POSTS-SERVICE
          predicates:
            - Path=/posts/v3/api-docs

        # ==========================
        # Connections Service
        # ==========================
        - id: connections-service
          uri: lb://CONNECTIONS-SERVICE
          predicates:
            - Path=/api/v1/connections/**
          filters:
            - StripPrefix=2
            - name: AuthenticationFilter

        # Swagger
        - id: connections-swagger
          uri: lb://CONNECTIONS-SERVICE
          predicates:
            - Path=/connections/v3/api-docs

        # ==========================
        # Uploader Service
        # ==========================
        - id: uploader-service
          uri: lb://UPLOADER-SERVICE
          predicates:
            - Path=/api/v1/uploads/**
          filters:
            - StripPrefix=2
            - name: AuthenticationFilter

        # Swagger
        - id: uploader-swagger
          uri: lb://UPLOADER-SERVICE
          predicates:
            - Path=/uploads/v3/api-docs

        # ==========================
        # Notification Service
        # ==========================
        - id: notification-service
          uri: lb://NOTIFICATION-SERVICE
          predicates:
            - Path=/api/v1/notifications/**
          filters:
            - StripPrefix=2
            - name: AuthenticationFilter

        # Swagger
        - id: notification-swagger
          uri: lb://NOTIFICATION-SERVICE
          predicates:
            - Path=/notifications/v3/api-docs

# ==================================
# Swagger Aggregation
# ==================================

springdoc:
  swagger-ui:
    urls:
      - name: User Service
        url: /users/v3/api-docs

      - name: Posts Service
        url: /posts/v3/api-docs

      - name: Connections Service
        url: /connections/v3/api-docs

      - name: Uploader Service
        url: /uploads/v3/api-docs

      - name: Notification Service
        url: /notifications/v3/api-docs

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka

  instance:
    prefer-ip-address: true

